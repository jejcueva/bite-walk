name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS profile to build
        type: choice
        options:
          - development
          - preview
          - production
        default: preview
      platform:
        description: Platform to build
        type: choice
        options:
          - all
          - android
          - ios
        default: all
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app with EAS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PROJECT_ID: ${{ secrets.EXPO_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure EXPO_TOKEN is configured
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "Missing EXPO_TOKEN secret in GitHub repository settings."
            exit 1
          fi
          if [ -z "$EXPO_PROJECT_ID" ]; then
            echo "Missing EXPO_PROJECT_ID secret in GitHub repository settings."
            exit 1
          fi

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.profile }}"
            PLATFORM="${{ github.event.inputs.platform }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            PROFILE="production"
            PLATFORM="all"
          else
            PROFILE="preview"
            PLATFORM="all"
          fi
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"

      - name: Link EAS project
        run: npx eas-cli project:init --id "$EXPO_PROJECT_ID" --force --non-interactive

      - name: Run EAS build
        run: npx eas-cli build --platform ${{ steps.params.outputs.platform }} --profile ${{ steps.params.outputs.profile }} --non-interactive --no-wait
